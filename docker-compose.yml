services:
  redis:
    image: redis:7-alpine
    container_name: geo_redis
    restart: unless-stopped
    ports:
      - "6380:6379"            # host:6380 → container:6379 (avoids port conflicts)
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - geo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: geo_redis_insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    networks:
      - geo_network
    depends_on:
      redis:
        condition: service_healthy

  # One-shot container: waits for RedisInsight to be ready, then
  # registers the Redis connection via its REST API and exits.
  redis-insight-init:
    image: curlimages/curl:latest
    container_name: geo_redis_insight_init
    restart: "no"
    networks:
      - geo_network
    depends_on:
      redis:
        condition: service_healthy
      redis-insight:
        condition: service_started
    command:
      - sh
      - -c
      - |
        echo 'Waiting for RedisInsight to be ready...'
        sleep 15
        echo 'Registering Redis connection in RedisInsight...'
        curl -sf -X POST http://redis-insight:5540/api/databases \
          -H 'Content-Type: application/json' \
          -d '{"host":"redis","port":6379,"name":"geo-map-redis"}' \
          && echo 'Redis connection registered successfully!' \
          || echo 'Registration failed - add manually at http://localhost:5540'

  api:
    build: .
    container_name: geo_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    networks:
      - geo_network
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  redis_insight_data:

networks:
  geo_network:
    driver: bridge
